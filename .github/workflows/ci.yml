name: CI and Deploy Pages

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: 依存関係をインストール
        run: npm ci

      - name: テストを実行
        run: npm test

  deploy:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: Pages を設定
        uses: actions/configure-pages@v5

      - name: Pages 用成果物をアップロード
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4