name: CI
# プッシュまたはプルリク時にジョブをスタート(プッシュはmainもしくはmasterのみ)
on:
  push:
    branches:
      - main
      - master
  pull_request:
# テストを実行
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: 依存関係をインストール
        run: npm ci

      - name: テストを実行
        run: npm test